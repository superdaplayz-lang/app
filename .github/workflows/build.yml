name: Bygg APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Last ned koden
        uses: actions/checkout@v4

      - name: Sett opp Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Last ned Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/master/gradlew" \
            -o gradlew
          chmod +x gradlew

      - name: Bygg APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: BussWidget-APK
          path: app/build/outputs/apk/debug/app-debug.apk